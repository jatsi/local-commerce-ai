version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - qdrant
      - ollama

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - qdrant
      - ollama

  scheduler:
    build:
      context: .
      dockerfile: infra/docker/scheduler.Dockerfile
    env_file:
      - .env
    depends_on:
      - redis
      - postgres

  dashboard:
    build:
      context: .
      dockerfile: infra/docker/dashboard.Dockerfile
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: commerce_ai
      POSTGRES_USER: localai
      POSTGRES_PASSWORD: localai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  pgdata:
  qdrant_data:
  ollama_data:
