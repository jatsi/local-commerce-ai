services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-commerce_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:0.5.7
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - redis
      - qdrant
      - ollama
    ports:
      - "8000:8000"
    command: ["bash", "-lc", "alembic upgrade head && uvicorn apps.api_gateway.app.main:app --host 0.0.0.0 --port 8000"]

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file: .env
    depends_on:
      - api
      - redis
    command: ["celery", "-A", "apps.worker.main.celery_app", "worker", "--loglevel=INFO"]

  scheduler:
    build:
      context: .
      dockerfile: infra/docker/scheduler.Dockerfile
    env_file: .env
    depends_on:
      - redis
    command: ["celery", "-A", "apps.scheduler.main.celery_app", "beat", "--loglevel=INFO"]

  dashboard:
    build:
      context: .
      dockerfile: infra/docker/dashboard.Dockerfile
    env_file: .env
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
